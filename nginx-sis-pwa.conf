# Drop-in for nv5.haatetepe.no — include inside the HTTPS server block.
# PWA/start_url must land on /sis/, not the static content tree.

location = /sis/content {
    return 302 /sis/;
}
location = /sis/content/ {
    return 302 /sis/;
}
location = /sis/content/index.html {
    return 302 /sis/;
}
