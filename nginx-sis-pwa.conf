# Speiles til /sis/nginx-sis-pwa.conf ved ?sync=server.
# Én gang i HTTPS server-block (juster absolutt sti til webroot):
#   include /var/www/.../sis/nginx-sis-pwa.conf;
# Deretter: nginx -t && systemctl reload nginx
# (nginx leser ikke filen på nytt uten reload — sync oppdaterer bare disk.)
#
# PWA/start_url skal lande på /sis/, ikke /sis/content/.

location = /sis/content {
    return 302 /sis/;
}
location = /sis/content/ {
    return 302 /sis/;
}
location = /sis/content/index.html {
    return 302 /sis/;
}

# Ikke server konfigfilen over HTTP
location = /sis/nginx-sis-pwa.conf {
    deny all;
    return 404;
}
