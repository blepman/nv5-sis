<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0b1220" />
    <title>NV5 SIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/kiosk.css" />
  </head>
  <body>
    <div class="board" id="board">
      <header class="board__header">
        <div class="board__titles">
          <p class="board__eyebrow">Sanntid</p>
          <h1 class="board__stop" id="boardTitle">Avganger</h1>
        </div>
        <div class="board__header-right">
          <button
            type="button"
            class="settings-btn"
            id="settingsOpen"
            aria-label="Innstillinger"
          >
            Innstillinger
          </button>
          <div class="board__clock" aria-live="polite">
            <time id="clock" datetime="">--:--:--</time>
            <p class="board__updated" id="updated">Oppdaterer…</p>
          </div>
        </div>
      </header>

      <main class="board__main">
        <div id="boards" class="boards" aria-live="polite"></div>
        <p class="board__status" id="status" hidden></p>
      </main>
    </div>

    <dialog class="settings" id="settingsDialog">
      <form method="dialog" class="settings__panel" id="settingsForm">
        <header class="settings__header">
          <h2>Innstillinger</h2>
          <button type="submit" class="settings__close" value="cancel">Lukk</button>
        </header>

        <label class="settings__field">
          <span>Elementer per holdeplass</span>
          <input
            type="number"
            id="elementsPerQuay"
            min="2"
            max="8"
            step="1"
            value="3"
          />
          <small>Siste element viser de neste 3–4 avgangene</small>
        </label>

        <section class="settings__section">
          <h3>Valgte holdeplasser</h3>
          <ul class="settings__quays" id="selectedQuays"></ul>
        </section>

        <section class="settings__section">
          <h3>Legg til holdeplass</h3>
          <label class="settings__field">
            <span>Søk</span>
            <input
              type="search"
              id="stopSearch"
              placeholder="F.eks. Tveita T"
              autocomplete="off"
            />
          </label>
          <ul class="settings__results" id="searchResults"></ul>
          <div class="settings__quay-pick" id="quayPick" hidden>
            <p class="settings__hint" id="quayPickTitle"></p>
            <ul class="settings__results" id="quayResults"></ul>
          </div>
        </section>

        <footer class="settings__footer">
          <button type="button" class="settings__save" id="settingsSave">
            Lagre
          </button>
        </footer>
      </form>
    </dialog>

    <script src="config.js"></script>
    <script src="js/entur.js"></script>
    <script src="js/site.js"></script>
  </body>
</html>
