<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="NV5 SIS – sanntidsavganger for kollektivtrafikk på holdeplass."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NV5 SIS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0b1220" />
    <title>NV5 SIS – sanntidsavganger</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link
      rel="preload"
      href="fonts/ibm-plex-sans-700-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/ibm-plex-sans-600-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="css/kiosk.css" />
  </head>
  <body>
    <div class="board" id="board">
      <header class="board__header">
        <div class="board__brand">
          <h1 class="board__stop" id="boardTitle">NV5-SIS</h1>
          <div class="board__clock" aria-live="polite">
            <time id="clock" datetime="">--:--:--</time>
          </div>
        </div>
        <div class="menu" id="appMenu">
          <button
            type="button"
            class="menu__toggle"
            id="menuToggle"
            aria-label="Meny"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="menuPanel"
          >
            <span class="menu__icon" aria-hidden="true"></span>
          </button>
          <div class="menu__panel" id="menuPanel" hidden>
            <button type="button" class="menu__item" id="settingsOpen">
              Innstillinger
            </button>
            <button
              type="button"
              class="menu__item"
              id="syncBoard"
              title="Henter HTML/CSS/JS fra GitHub-branchen main"
            >
              Hent ny tavle
            </button>
            <button
              type="button"
              class="menu__item menu__item--danger"
              id="clearLocal"
              title="Sletter innstillinger og andre lagrede valg i denne nettleseren"
            >
              Slett lokal lagring
            </button>
          </div>
        </div>
      </header>

      <main class="board__main">
        <div id="boards" class="boards" aria-live="polite"></div>
        <p class="board__status" id="status" hidden></p>
      </main>
    </div>

    <dialog
      class="settings"
      id="settingsDialog"
      aria-labelledby="settingsTitle"
    >
      <form method="dialog" class="settings__panel" id="settingsForm">
        <header class="settings__header">
          <h2 id="settingsTitle">Innstillinger</h2>
          <div class="settings__header-actions">
            <button type="button" class="settings__save" id="settingsSave">
              Lagre
            </button>
            <button type="submit" class="settings__close" value="cancel">Lukk</button>
          </div>
        </header>

        <label class="settings__field">
          <span>Elementer per holdeplass</span>
          <input
            type="number"
            id="elementsPerQuay"
            min="2"
            max="8"
            step="1"
            value="3"
          />
          <small>Siste element viser de neste 4 avgangstidene som ticker</small>
        </label>

        <fieldset class="settings__fieldset">
          <legend>Avgangsinformasjon</legend>
          <label class="settings__check">
            <input type="checkbox" id="showJourneyProgress" checked />
            <span>Vis hvor transportmiddelet er (f.eks. Mot Haugerud)</span>
          </label>
          <label class="settings__check">
            <input type="checkbox" id="showOccupancy" checked />
            <span>Vis belegg når tilgjengelig (ikke passasjertall)</span>
          </label>
          <label class="settings__check">
            <input type="checkbox" id="showServiceRuns" checked />
            <span>Vis tjenestekjøring (ellers skjules)</span>
          </label>
        </fieldset>

        <label class="settings__field">
          <span>Sjekk tavlekode fra GitHub (main)</span>
          <select id="githubCheckInterval">
            <option value="0">Ved hvert besøk</option>
            <option value="60">Hvert minutt</option>
            <option value="300" selected>Hvert 5. minutt</option>
            <option value="900">Hvert 15. minutt</option>
            <option value="1800">Hvert 30. minutt</option>
            <option value="3600">Hver time</option>
          </select>
          <small>
            Styrer hvor ofte tavlen (HTML/CSS/JS) hentes fra main. Bruk
            «Hent ny tavle» i menyen for å hente med en gang.
          </small>
        </label>

        <div class="settings__field">
          <span>Serverfiler (server-branch)</span>
          <button
            type="button"
            class="settings__action"
            id="syncServer"
            title="Henter PHP/serverfiler fra GitHub-branchen server"
          >
            Bygg siden på nytt
          </button>
          <small>
            Sjekkes automatisk hver time. Bruk knappen bare når serverkoden er
            endret.
          </small>
        </div>

        <section class="settings__section" aria-labelledby="selectedQuaysTitle">
          <h3 id="selectedQuaysTitle">Valgte holdeplasser</h3>
          <ul class="settings__quays" id="selectedQuays"></ul>
        </section>

        <section class="settings__section" aria-labelledby="addStopTitle">
          <h3 id="addStopTitle">Legg til holdeplass</h3>
          <p class="settings__hint">
            Velg «Alle retninger» eller én kai/retning, deretter linjer.
          </p>
          <label class="settings__field">
            <span>Søk</span>
            <input
              type="search"
              id="stopSearch"
              placeholder="F.eks. Tveita T"
              autocomplete="off"
            />
          </label>
          <ul class="settings__results" id="searchResults"></ul>
          <div class="settings__quay-pick" id="quayPick" hidden>
            <p class="settings__hint" id="quayPickTitle"></p>
            <ul class="settings__results" id="quayResults"></ul>
          </div>
        </section>
      </form>
    </dialog>

    <noscript>
      <p>NV5 SIS krever JavaScript for å vise sanntidsavganger.</p>
    </noscript>

    <script src="config.js" defer></script>
    <script src="js/entur.js" defer></script>
    <script src="js/site.js" defer></script>
  </body>
</html>
